# Opcional: use apenas se tiver espaço e Docker disponível.
# Para desenvolvimento local sem Docker, veja README.md (MongoDB local ou Atlas).

services:
  mongodb:
    image: mongo:7
    container_name: chatterbox-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: chatterbox-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - full

volumes:
  mongodb_data:
